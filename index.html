<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/compass.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- SEO 메타 태그 -->
    <meta name="description" content="TravelLog - 여행 경로와 사진을 지도 위에 기록하세요" />
    <meta name="theme-color" content="#0ea5e9" />
    <!-- Google Fonts: Inter 폰트 로드 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>TravelLog</title>
    <!-- GitHub Pages SPA 라우팅 복원 스크립트 (404.html과 쌍으로 동작) -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <!-- React 앱이 마운트되는 루트 엘리먼트 -->
    <div id="root"></div>
    <!-- Vite가 TypeScript/React를 처리하는 진입점 -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
